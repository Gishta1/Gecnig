<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Gecnig</title>
    <style>
        /* ЛОГИЧЕСКАЯ ПРОВЕРКА 1: Сброс отступов и запрет прокрутки */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Критически важно: убирает полосы прокрутки */
            background-color: #000000; /* Цвет фона во время загрузки */
        }

        /* ЛОГИЧЕСКАЯ ПРОВЕРКА 2: Контейнер должен занимать всё доступное пространство */
        #unity-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ЛОГИЧЕСКАЯ ПРОВЕРКА 3: Canvas растягивается на весь контейнер */
        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block; /* Критически важно: убирает нижний отступ в 3-4px, который браузеры добавляют inline-элементам */
            background: #000000;
        }

        /* Стили для индикатора загрузки (по центру экрана) */
        #unity-loading-bar {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            max-width: 80%;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;
        }
        #unity-progress-bar-empty {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: #4caf50;
            transition: width 0.2s ease;
        }
    </style>
</head>
<body>
    <div id="unity-container">
        <!-- Canvas, который будет растягиваться -->
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        
        <!-- Индикатор загрузки -->
        <div id="unity-loading-bar">
            <div id="unity-logo">Загрузка Gecnig...</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <!-- Скрипт загрузчика Unity -->
    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");

        // ВНИМАНИЕ: Замените 'Build' на имя папки вашего билда, если оно отличается
        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/index.loader.js"; // Или имя вашего .loader.js файла
        var config = {
            dataUrl: buildUrl + "/index.data",
            frameworkUrl: buildUrl + "/index.framework.js",
            codeUrl: buildUrl + "/index.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "Gecnig",
            productVersion: "1.0",
        };

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                loadingBar.style.display = "none"; // Скрываем загрузку после завершения
                // unityInstance.SetFullscreen(1); // Раскомментируйте, если нужно сразу включить полноэкранный режим браузера (F11)
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
